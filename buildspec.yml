version: 0.2
env:
  variables:
    App_Env: "production"
    Dept: "Engg."
    Api_Url: "https://www.example.com"

  parameter-store:
    USER: "DB_USER"
    PWD: "DB_PASSWORD"

  secrets-manager:
    DHUB: "DOCKER_LOGIN"

phases:
  install:
    runtime-versions:
         java: corretto21
    commands:
      - echo "Setting Up The Environment"
      
  build:
    commands:
      - 'echo "Environment: $App_Env"'
      - 'echo "Dept: $Dept"'
      - 'echo "Api_Url: $Api_Url"'
      - 'echo "DB-USER: $USER"'
      - 'echo "DB-PASSWORD: $PWD"'
      - 'echo "Docker_Cred: $DHUB"'
      
      - echo Build started on `date`
      - mvn -DskipTests clean install

  post_build:
      - echo "Verifying the artifact exists on the local path..."
      - ls -la ${CODEBUILD_SRC_DIR}/target

artifacts:
    files:
       - 'target/*.jar'
    name: build-artifact-{CODEBUILD_BUILD_NUMBER}
    discard-path: yes

cache:
   paths:
      - '/root/.m2/**/*' 

