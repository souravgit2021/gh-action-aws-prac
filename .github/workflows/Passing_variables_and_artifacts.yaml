name: Pass Variables Example
on: workflow_dispatch

jobs:
  job1:
    runs-on: ubuntu-latest
    # FIXED: Moved outputs to the job level, aligned with runs-on
    outputs:
      my_shared_var: ${{ steps.set_var.outputs.my_value }}
    steps:
       - name: Generate A Value
         id: set_var
         run: echo "my_value=HellowFromJob1" >> $GITHUB_OUTPUT
  
  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: use the variable
        run: echo "The value received is ${{ needs.job1.outputs.my_shared_var }}" 
   
  build_job:
     runs-on: ubuntu-latest
     steps:
        - name: Create A Dummy Build Asset
          run: |
            mkdir -p build_output
            echo "Build PayLoad Data" > build_output/app.bin
        
        - name: Upload The asset
          uses: actions/upload-artifact@v4
          with:
            name: compiled-binary-asset
            # FIXED: Path now matches the directory created above
            path: build_output/app.bin

  deploy_job:
    needs: build_job
    runs-on: ubuntu-latest
    steps:
       - name: Download The Asset
         uses: actions/download-artifact@v4
         with: 
            name: compiled-binary-asset
            path: extracted_output/

       - name: Verify The Received File
         run: cat extracted_output/app.bin
